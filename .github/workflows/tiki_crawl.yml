name: Tiki Price Crawler

on:
  push:
    branches:
      - action
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    concurrency:
      group: tiki-crawl
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'action' || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Xvfb (virtual display)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Crawler
        env:
          USER: ${{ secrets.user }}
          PASSWORD: ${{ secrets.password }}
          HOST: ${{ secrets.host }}
          DBNAME: ${{ secrets.dbname }}
          PORT: ${{ secrets.port }}
        run: |
          google-chrome --version
          xvfb-run -a python src/crawl/product_crawler.py